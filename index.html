<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liminal spaces</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&family=Caveat&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: #f0f0f5;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,100,200,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(100,150,255,0.25), transparent 40%),
    #0f0f1a;
}

header { text-align: center; padding: 60px 20px; }
h1 { font-family: 'Playfair Display'; text-shadow: 0 0 15px rgba(180,150,255,0.4); }

.container { max-width: 700px; margin: auto; padding: 20px; }

.post { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.post:hover { text-shadow: 0 0 10px purple; }

.preview { opacity: 0.7; }

.fullPost {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  padding: 20px;
}

.editor {
  position: fixed;
  bottom: 80px; /* lifted above ads */
  right: 20px;
  background: rgba(20,20,40,0.95);
  padding: 12px;
  border-radius: 12px;
  width: 260px;
  box-shadow: 0 0 20px rgba(140,120,255,0.2);
  z-index: 9999; /* stays above overlays */
}
</style></head><body><header>
<h1>liminal spaces</h1>
<p>somewhere between who i was and who i'm becoming</p>
</header><div class="container" id="blog"></div><div class="fullPost" id="fullPost" onclick="closePost()">
<div id="fullContent"></div>
</div><div class="editor">
<input id="title" placeholder="title"><br>
<textarea id="content" placeholder="write..."></textarea><br>
<button onclick="addPost()">post</button>
</div><!-- SOUND (WORKING VERSION) --><audio id="clickSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8e56c1c9b.mp3" type="audio/mpeg">
</audio><script>
let posts = JSON.parse(localStorage.getItem('posts_final')) || [];
let current = null;

const click = document.getElementById("clickSound");
let unlocked = false;

// unlock sound on first tap
window.addEventListener("click", () => {
  if (!unlocked) {
    click.play().then(() => {
      click.pause();
      click.currentTime = 0;
      unlocked = true;
    }).catch(()=>{});
  }
}, { once: true });

function play() {
  if (!unlocked) return;
  click.currentTime = 0;
  click.play().catch(()=>{});
}

function render() {
  let blog = document.getElementById("blog");
  blog.innerHTML = "";

  posts.forEach((p,i)=>{
    blog.innerHTML += `
      <div class="post" onclick="openPost(${i})">
        <h2>${p.title}</h2>
        <div class="preview">${p.content.slice(0,200)}...</div>
      </div>
    `;
  });
}

function addPost() {
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  if(!title || !content) return;

  content = content.replace(/\n/g,"<br>");

  posts.unshift({title,content});
  localStorage.setItem('posts_final', JSON.stringify(posts));

  play();
  render();
}

function openPost(i) {
  current = i;
  play();

  document.getElementById("fullContent").innerHTML =
    "<h2>"+posts[i].title+"</h2><p>"+posts[i].content+"</p>";

  document.getElementById("fullPost").style.display="block";
}

function closePost() {
  play();
  document.getElementById("fullPost").style.display="none";
}

render();
</script></body>
</html>
